name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: be_the_hero
          POSTGRES_PASSWORD: be_the_hero
          POSTGRES_DB: be_the_hero
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U be_the_hero -d be_the_hero"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm -v

      # Cache do pnpm store (mais previsível que "cache: pnpm" do setup-node)
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate (api)
        env:
          DATABASE_URL: postgresql://be_the_hero:be_the_hero@localhost:5432/be_the_hero
        run: pnpm --filter api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: API e2e
        env:
          DATABASE_URL: postgresql://be_the_hero:be_the_hero@localhost:5432/be_the_hero
          JWT_SECRET: test-secret
          NODE_OPTIONS: --experimental-vm-modules
        run: |
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api test:e2e
